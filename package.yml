package: d2u_guestbook
version: '2.1.1'
author: Friends Of REDAXO
supportpage: http://github.com/FriendsOfREDAXO/d2u_guestbook

page:
    title: 'translate:d2u_guestbook'
    perm: 'd2u_guestbook[]'
    icon: rex-icon fa-book
    subpages:
        entries: { title: 'translate:d2u_guestbook_entries', icon: rex-icon fa-book, perm: 'd2u_guestbook[]' }
        settings:
            icon: rex-icon rex-icon-system
            title: ''
            itemClass: pull-right
            subpages:
                settings: { title: 'translate:d2u_helper_settings', icon: rex-icon rex-icon-system, perm: 'd2u_guestbook[settings]' }
                setup: { title: 'translate:d2u_helper_setup', icon: rex-icon rex-icon-install, perm: 'd2u_guestbook[settings]' }
        help:
            title: ''
            icon: rex-icon rex-icon-help
            itemClass: pull-right
            subpages:
                changelog: { title: 'translate:d2u_helper_help_chapter_changelog' }

requires:
    redaxo: '>=5.10.0'
    packages:
        d2u_helper: '>=2.1.0'
        sprog: '>=1.0.0'
        yform: '>=3.0'
    php: '>=8.0'

default_config:
    allow_answer: 'false'
    no_entries_page: 10

installer_ignore:
    - .github